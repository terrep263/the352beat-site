<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The 352 Beat — Story of the Week</title>
<meta name="robots" content="noindex" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,900&family=Libre+Franklin:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{--blue:#0021A5;--orange:#FA4616;--orange-deep:#D8390E;--aqua:#1FA8B8;--green:#4C8C3F;--cream:#FBF6EC;--ink:#23201A;--muted:#6B6457;--line:#E7DEC9;--serif:'Fraunces',Georgia,serif;--sans:'Libre Franklin',system-ui,sans-serif;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--cream);color:var(--ink);font-family:var(--sans);font-size:19px;line-height:1.7;-webkit-font-smoothing:antialiased;}
  a{color:var(--blue);}
  .wrap{max-width:720px;margin:0 auto;padding:0 28px;}
  .nav{border-bottom:2px solid var(--blue);}
  .nav .wrap{display:flex;align-items:center;justify-content:space-between;padding:18px 28px;}
  .brand{font-family:var(--serif);font-weight:900;font-size:22px;color:var(--blue);line-height:1;text-decoration:none;}
  .brand small{display:block;font-family:var(--sans);font-weight:600;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-top:3px;}
  article{padding:56px 0 40px;}
  .where{font-family:var(--sans);font-weight:600;font-size:13px;letter-spacing:.1em;text-transform:uppercase;color:var(--green);margin-bottom:12px;}
  h1{font-family:var(--serif);font-weight:900;font-size:clamp(32px,5vw,52px);line-height:1.06;letter-spacing:-.02em;color:var(--blue);margin-bottom:26px;}
  .body p{margin:0 0 22px;}
  .loading{color:var(--muted);font-style:italic;}
  .endcap{margin-top:14px;padding:30px 32px;background:var(--blue);color:#fff;border-radius:16px;text-align:center;}
  .endcap h3{font-family:var(--serif);font-weight:600;font-size:24px;margin-bottom:8px;}
  .endcap p{color:#C9D2F4;font-size:16px;margin-bottom:18px;}
  .endcap a{display:inline-block;background:var(--orange);color:#fff;font-weight:700;border-radius:999px;padding:13px 30px;text-decoration:none;}
  .endcap a:hover{background:var(--orange-deep);}
  footer{border-top:1px solid var(--line);padding:26px 0;font-size:13px;color:var(--muted);}
</style>
</head>
<body>
  <nav class="nav"><div class="wrap" style="padding-left:0;padding-right:0;"><a class="brand" href="/">The 352 Beat<small>A Common Ground Press project</small></a></div></nav>

  <article>
    <div class="wrap">
      <div class="where" id="where">The 352</div>
      <h1 id="headline">Story of the Week</h1>
      <div class="body" id="body"><p class="loading">Loading the story&hellip;</p></div>

      <div class="endcap">
        <h3>Get this every week</h3>
        <p>One friendly email — the events, businesses, and stories worth your time in the 352.</p>
        <a href="/#signup">Subscribe free &rarr;</a>
      </div>
    </div>
  </article>

  <footer><div class="wrap">The 352 Beat &middot; a Common Ground Press project &middot; ATLV Solutions</div></footer>

<script>
  (function(){
    var params=new URLSearchParams(location.search);
    if(!params.get("unlocked")){ location.replace("/unlock"); return; }
    function esc(s){var d=document.createElement("div");d.textContent=s==null?"":String(s);return d.innerHTML;}
    fetch("https://thenewsletterfactory.com/api/top-story").then(function(r){return r.json();}).then(function(d){
      var s=d&&d.story;
      var bodyEl=document.getElementById("body");
      if(!s||!s.headline){ bodyEl.innerHTML='<p>This week\u2019s story isn\u2019t posted yet \u2014 check back soon.</p>'; return; }
      document.getElementById("headline").innerHTML=esc(s.headline);
      document.getElementById("where").innerHTML=esc(s.location||"The 352");
      document.title=s.headline+" \u2014 The 352 Beat";
      var text=s.body||s.blurb||"";
      var paras=text.split(/\n\n+/).map(function(p){return "<p>"+esc(p.trim())+"</p>";}).join("");
      bodyEl.innerHTML=paras||"<p>"+esc(s.blurb||"")+"</p>";
    }).catch(function(){
      document.getElementById("body").innerHTML='<p>We couldn\u2019t load the story right now. Please try again in a moment.</p>';
    });
  })();
</script>
</body>
</html>
